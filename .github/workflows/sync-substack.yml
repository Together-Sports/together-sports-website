name: Sync Substack Posts

# This workflow is intentionally Substack-only.
# - It checks the Substack feed on a schedule.
# - It commits only if the generated blog data changed.
# - Vercel redeploys only when that commit exists.
# - USTA sessions are not part of this cron job because they are already
#   fetched live at runtime via api/usta-sessions.ts.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Substack feed
        run: npm run sync:substack

      - name: Commit synced posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/blogPosts.ts
          # If there is no content change, stop here:
          # - no commit
          # - no push
          # - no Vercel redeploy
          git diff --cached --quiet && exit 0
          git commit -m "chore: sync Substack posts"
          git push
